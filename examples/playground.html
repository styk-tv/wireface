<!DOCTYPE html>
<!--
  wireface — minimal CDN playground
  Repository:  https://github.com/styk-tv/wireface
  npm:         https://www.npmjs.com/package/wireface

  Released under the MIT License — see LICENSE in the repository root.

  Self-contained, ~100 lines. Drop an mp3 onto the canvas, switch
  between two preset characters, hit ▶ play. Library + Babylon both
  loaded from CDN. Designed to be as close as possible to a copy-paste
  for playground.babylonjs.com — see SPEC.WIREFACE.BABYLON.9.0 §6.
-->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>wireface — playground</title>
<style>
  html,body { margin:0; height:100%; background:#000; color:#f4f4f0; font-family: ui-monospace, monospace; }
  #app { display:grid; grid-template-rows:auto 1fr auto; height:100%; }
  header { padding:12px 16px; border-bottom:1px solid rgba(255,255,255,.12); display:flex; gap:18px; align-items:center; font-size:11px; letter-spacing:.16em; text-transform:uppercase; }
  header b { color:#f5e663; letter-spacing:.3em; font-weight:500; }
  header .hint { color:#888; }
  .canvas-wrap { position:relative; min-height:0; background:#000; }
  canvas { width:100%; height:100%; display:block; outline:none; touch-action:none; }
  .drop-overlay { position:absolute; inset:0; display:grid; place-items:center;
    background:rgba(0,0,0,.6); border:2px dashed #f5e663; color:#f5e663;
    font-size:12px; letter-spacing:.2em; text-transform:uppercase; pointer-events:none; opacity:0;
    transition:opacity .15s; }
  .canvas-wrap.drag-over .drop-overlay { opacity:1; }
  .controls { display:flex; gap:8px; align-items:center; padding:10px 16px; border-top:1px solid rgba(255,255,255,.12); font-size:11px; }
  button { font-family:inherit; font-size:10px; letter-spacing:.16em; text-transform:uppercase;
    background:transparent; color:#f4f4f0; border:1px solid rgba(255,255,255,.22);
    padding:8px 14px; cursor:pointer; transition:all .12s; }
  button:hover:not(:disabled) { background:#f4f4f0; color:#000; border-color:#f4f4f0; }
  button.on { background:#f5e663; color:#000; border-color:#f5e663; }
  button:disabled { opacity:.3; cursor:not-allowed; }
  .audio-name { font-size:10px; color:#888; margin-left:auto; padding-left:14px; border-left:2px solid rgba(255,255,255,.22); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:300px; }
</style>
</head>
<body>
<div id="app">
  <header>
    <b>WIREFACE</b>
    <span class="hint">drop .mp3 onto the face · switch presets · play</span>
  </header>
  <div class="canvas-wrap" id="wrap">
    <canvas id="cv"></canvas>
    <div class="drop-overlay">drop an audio file</div>
  </div>
  <div class="controls">
    <button data-preset="A" class="on">preset A · red wire</button>
    <button data-preset="B">preset B · low-poly blue</button>
    <button id="btn-play">▶ play</button>
    <button id="btn-stop">■ stop</button>
    <span class="audio-name" id="audio-name">no audio loaded</span>
  </div>
</div>

<!-- Babylon v9 + wireface from CDN -->
<script src="https://cdn.jsdelivr.net/npm/babylonjs@9/babylon.js"></script>
<script src="https://cdn.jsdelivr.net/npm/wireface@1/dist/wireface.min.js"></script>

<script>
/* Two character presets baked-in — same shape as
   examples/presets/asset-th5rha.json (red wire) and asset-ydr7de.json
   (low-poly blue). Trimmed to just the renderConfig fields that
   matter for the visual. The lib fills in defaults for everything
   else (per-feature colors null = inherit, channelGains 1.0, etc.). */
const PRESETS = {
  A: {
    name: 'red wire',
    renderConfig: {
      meshCols: 21, meshRows: 21, fragment: true, glow: true,
      mouthHole: true, mouthHoleSize: 1.15, eyeHoles: true, eyeDepth: 5,
      lineThickness: 0.4, lipVertAmp: 4, lipPressForce: 3,
      pupils: true, irisSize: 3.3,
      lineColor: '#541717', baseColor: '#ff8585', fadeColor: '#f00000',
      pupilColor: '#c4b0b0', irisColor: '#ff0000', browColor: '#616161',
      depthFade: 1, mouthAnchor: true, eyeAnchor: true,
    },
  },
  B: {
    name: 'low-poly blue',
    renderConfig: {
      meshCols: 7, meshRows: 9, fragment: true, glow: true,
      mouthHole: true, mouthHoleSize: 1.85, eyeHoles: false, eyeDepth: 1,
      scaleNose: 1.15, scaleEyes: 2, scaleMouth: 2,
      lineThickness: 1, lipVertAmp: 1.6,
      pupils: true, irisSize: 2,
      lineColor: '#181616', baseColor: '#7a86c2', fadeColor: '#f00000',
      pupilColor: '#3a2727', irisColor: '#170303',
      depthFade: 0.4, mouthAnchor: true,
    },
  },
};

/* Boot one wireface instance against the canvas. */
const wf = createWireface(document.getElementById('cv'));
wf.setLoop(true);
wf.loadPreset(PRESETS.A);

/* Preset switcher. */
for (const btn of document.querySelectorAll('[data-preset]')) {
  btn.addEventListener('click', () => {
    document.querySelectorAll('[data-preset]').forEach(b => b.classList.remove('on'));
    btn.classList.add('on');
    wf.loadPreset(PRESETS[btn.dataset.preset]);
  });
}

/* Transport. */
const playBtn = document.getElementById('btn-play');
const stopBtn = document.getElementById('btn-stop');
playBtn.addEventListener('click', () => {
  if (wf.isPlaying()) { wf.pause(); playBtn.textContent = '▶ play'; }
  else                { wf.play();  playBtn.textContent = '❚❚ pause'; }
});
stopBtn.addEventListener('click', () => { wf.stop(); playBtn.textContent = '▶ play'; });

/* Drag-drop audio onto the canvas wrap. */
const wrap = document.getElementById('wrap');
const audioLabel = document.getElementById('audio-name');
wrap.addEventListener('dragenter', e => { e.preventDefault(); wrap.classList.add('drag-over'); });
wrap.addEventListener('dragover',  e => { e.preventDefault(); e.dataTransfer.dropEffect = 'copy'; });
wrap.addEventListener('dragleave', e => {
  if (e.target === wrap || !wrap.contains(e.relatedTarget)) wrap.classList.remove('drag-over');
});
wrap.addEventListener('drop', async e => {
  e.preventDefault();
  wrap.classList.remove('drag-over');
  const file = e.dataTransfer.files && e.dataTransfer.files[0];
  if (!file) return;
  try {
    await wf.loadAudio(file);
    audioLabel.textContent = file.name;
  } catch (err) {
    audioLabel.textContent = 'decode failed: ' + err.message;
  }
});

/* Expose for console poking. */
window.wf = wf;
</script>
</body>
</html>

<!DOCTYPE html>
<!--
  wireface — playground · https://github.com/styk-tv/wireface
  MIT © 2026 Peter Styk

  Minimal: canvas, sample audio loops, ←/→ cycle presets, space toggles.
  Add your own: clone the repo, open examples/editor.html in a browser,
  tune sliders + colours, hit "save preset → ↓ download", paste the JSON
  literal into the PRESETS array below, send a PR.
-->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>wireface</title>
<style>
  html,body { margin:0; height:100%; background:#000; overflow:hidden; }
  canvas { width:100vw; height:100vh; display:block; outline:none; touch-action:none; }
  /* one tiny bottom-right link, dim, hover-brightens. nothing else. */
  a { position:fixed; bottom:10px; right:14px; font:10px ui-monospace,monospace;
      letter-spacing:.18em; text-transform:uppercase; color:rgba(255,255,255,.28);
      text-decoration:none; mix-blend-mode:difference; }
  a:hover { color:rgba(255,255,255,.9); }
</style>
</head>
<body>
<canvas id="cv"></canvas>
<a href="https://github.com/styk-tv/wireface" target="_blank">github · ←/→ swap · space play</a>

<script src="https://cdn.jsdelivr.net/npm/babylonjs@9/babylon.js"></script>
<script src="https://cdn.jsdelivr.net/npm/wireface@1/dist/wireface.min.js"></script>
<script>
/* PRESETS — full preset literals exactly as exported by the editor's
   "save preset → ↓ download" button. Append your own at the end; the UI
   adapts automatically (←/→ wraps the array). PR yours into
   examples/presets/ AND/OR append here so they land on the playground.
   First two are the loaded-on-init pair. */
const PRESETS = [
  {"version":"wireface-v010","createdAt":"2026-05-01T14:17:22.023Z","renderConfig":{"meshCols":17,"meshRows":23,"scaleNose":0.7000000000000001,"scaleEyes":0.45,"scaleMouth":1.1,"reactivity":0.22,"spread":1,"mode":"wire","pupils":true,"meshVisible":true,"minimal":true,"fragment":true,"glow":true,"flipFace":true,"loopAudio":true,"mouthHole":true,"mouthHoleSize":0.9,"eyeHoleSize":1.9500000000000002,"eyeHoles":true,"eyeDepth":0,"mouthAnchor":true,"eyeAnchor":true,"lineThickness":1,"lipVertAmp":0.5,"lipPressForce":0,"overlayTracksMesh":true,"moodTransitionTime":0.6000000000000001,"lineColor":"#ffffff","pupilColor":"#3e0f0f","baseColor":"#ca5858","fadeColor":"#000000","depthFade":1,"irisColor":"#121212","irisSize":1.6,"browColor":"#ffffff","jawExtend":1.1500000000000001,"mouthGrow":0,"depthFadeCurve":3,"upperJawProtrude":1.4500000000000002,"lowerJawProtrude":2.45,"mouthColor":"#454a1c","eyeColor":"#2c2b2b","noseColor":"#ffffff","minimalMouth":true,"minimalEyes":true,"minimalNose":false,"minimalBrows":false,"mouthLineThickness":0.2,"eyeLineThickness":0.2,"noseLineThickness":0.2,"browLineThickness":4},"channelGains":{},"activeMood":"neutral","moodTargetWeights":{"neutral":1},"id":"8pgwi9","name":"Wireface-001_8pgwi9"},

  // ← append more here. the UI adapts to whatever length this array is.
];

const wf = createWireface(document.getElementById('cv'));
wf.setLoop(true);

let idx = 0;
const apply = () => wf.loadPreset(PRESETS[idx]);
apply();

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
    idx = (idx + 1) % PRESETS.length; apply();
  } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
    idx = (idx - 1 + PRESETS.length) % PRESETS.length; apply();
  } else if (e.key === ' ') {
    wf.isPlaying() ? wf.pause() : wf.play();
    e.preventDefault();
  }
});

/* fetch the bundled TTS sample from jsDelivr's GitHub mirror (CORS-friendly,
   raw.githubusercontent.com isn't) and start playback. Browser autoplay
   policies require a user gesture for audio; on the playground that gesture
   is the click on the Run button so it works there. Locally, if it doesn't,
   space toggles play/pause. */
fetch('https://cdn.jsdelivr.net/gh/styk-tv/wireface@main/examples/Wireface-001-kokoro-santa.mp3')
  .then(r => r.blob())
  .then(blob => wf.loadAudio(new File([blob], 'sample.mp3')))
  .then(() => wf.play())
  .catch(() => {});

/* drag-drop your own .mp3 to override the sample */
window.addEventListener('dragover', e => e.preventDefault());
window.addEventListener('drop', async e => {
  e.preventDefault();
  const f = e.dataTransfer.files && e.dataTransfer.files[0];
  if (f) { await wf.loadAudio(f); wf.play(); }
});

window.wf = wf;
</script>
</body>
</html>
